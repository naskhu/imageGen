name: Generate Tech News Posts

on:
  workflow_dispatch:
  schedule:
    - cron: "15 1,7,13,19 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tech-news-bot/requirements.txt

      - name: Install dependencies
        run: pip install -r tech-news-bot/requirements.txt

      - name: Generate square Instagram posts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash-lite
        run: python tech-news-bot/bot.py

      - name: Commit generated posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tech-news-bot/output tech-news-bot/state.json
          if git diff --cached --quiet; then
            echo "No new posts to commit"
          else
            git commit -m "Generate latest tech news posts"
            git push
          fi
